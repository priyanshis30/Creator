<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CreatorDNA — Influence Genome Project</title>
<style>
:root{
  --bg:#0A0E10; --panel:#12181B; --raised:#161D21; --line:#232B2F;
  --primary:#EAF1EF; --secondary:#A4B5B2; --dim:#5C6B69;
  --trust:#4DD9C4; --purchase:#F2B544; --knowledge:#8B7FE8;
  --entertainment:#F2616B; --trend:#C8E84D; --community:#5AA9E6; --persuasion:#E85AC0;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--panel);} ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
.mono{font-family:'Courier New',monospace;}
.display{font-weight:700;}
.wrap{max-width:1140px;margin:0 auto;padding:0 28px;}
.eyebrow{display:flex;align-items:center;gap:10px;font-family:'Courier New',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--secondary);margin-bottom:12px;}
.tick{width:18px;height:2px;display:inline-block;flex-shrink:0;}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;}
.panel-raised{background:var(--raised);border:1px solid var(--line);border-radius:10px;}
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.02em;padding:9px 18px;border-radius:999px;border:1px solid var(--trust);background:transparent;color:var(--trust);cursor:pointer;transition:background .18s,color .18s,transform .12s;}
.btn:hover{background:var(--trust);color:#06201C;}
.btn:active{transform:scale(.97);}
.btn-solid{background:var(--trust);color:#06201C;}
.btn-solid:hover{background:#3FC2AE;}
.btn:disabled{opacity:.5;cursor:default;}
select{background:var(--raised);border:1px solid var(--line);color:var(--primary);font-family:'Courier New',monospace;font-size:12px;padding:9px 12px;border-radius:8px;width:100%;outline:none;}
select:focus{border-color:var(--trust);}
.tag{display:inline-flex;align-items:center;font-family:'Courier New',monospace;font-size:10px;letter-spacing:.04em;padding:5px 10px;border-radius:999px;border:1px solid var(--line);color:var(--secondary);text-transform:uppercase;}
.meter-track{height:7px;background:var(--line);border-radius:6px;overflow:hidden;}
.meter-fill{height:100%;border-radius:6px;transition:width .4s ease;}
.nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(10,14,16,.85);border-bottom:1px solid var(--line);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;gap:20px;}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:17px;letter-spacing:-.02em;}
.navlinks{display:flex;gap:24px;font-family:'Courier New',monospace;font-size:12px;letter-spacing:.04em;color:var(--secondary);}
.navlinks button{background:none;border:none;color:var(--secondary);cursor:pointer;font-size:12px;font-family:'Courier New',monospace;letter-spacing:.04em;padding:4px 2px;text-transform:capitalize;}
.navlinks button:hover{color:var(--primary);}
section{padding:80px 0;border-bottom:1px solid var(--line);}
h1,h2,h3{letter-spacing:-.02em;}
.creator-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;text-align:left;color:var(--primary);transition:border-color .18s,box-shadow .18s;position:relative;overflow:hidden;width:100%;}
.creator-card .accent{position:absolute;top:0;left:0;right:0;height:3px;}
@keyframes scan{from{margin-left:-40%;}to{margin-left:100%;}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:36px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.grid-7{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.hero-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:52px;align-items:center;}
.compare-grid{display:grid;grid-template-columns:1fr 100px 1fr;gap:18px;align-items:start;}
@media (max-width:880px){
  .hero-grid{grid-template-columns:1fr !important;}
  .grid-2{grid-template-columns:1fr !important;}
  .grid-3{grid-template-columns:1fr 1fr !important;}
  .grid-7{grid-template-columns:repeat(3,1fr) !important;}
  .grid-4{grid-template-columns:1fr 1fr !important;}
  .compare-grid{grid-template-columns:1fr !important;}
  .navlinks{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>

<script>
// ---------- DATA ----------
const C = {
  bg: "#0A0E10", panel: "#12181B", raised: "#161D21", line: "#232B2F",
  primary: "#EAF1EF", secondary: "#A4B5B2", dim: "#5C6B69",
  trust: "#4DD9C4", purchase: "#F2B544", knowledge: "#8B7FE8",
  entertainment: "#F2616B", trend: "#C8E84D", community: "#5AA9E6", persuasion: "#E85AC0",
};

const GENES = [
  { key: "trust", label: "Trust", code: "TRU", color: C.trust, desc: "How much the audience believes a recommendation is genuine." },
  { key: "purchase", label: "Purchase", code: "PUR", color: C.purchase, desc: "Likelihood followers actually buy what gets posted." },
  { key: "knowledge", label: "Knowledge", code: "KNO", color: C.knowledge, desc: "Educational depth and perceived expertise." },
  { key: "entertainment", label: "Entertainment", code: "ENT", color: C.entertainment, desc: "Raw ability to capture and hold attention." },
  { key: "trend", label: "Trend", code: "TRD", color: C.trend, desc: "Power to start trends rather than follow them." },
  { key: "community", label: "Community", code: "COM", color: C.community, desc: "Audience loyalty, repeat engagement, real conversation." },
  { key: "persuasion", label: "Persuasion", code: "PER", color: C.persuasion, desc: "Ability to actually change a follower's decision." },
];

const CREATORS = [
  { id: "prism", handle: "@prismloop", niche: "Gaming & Entertainment", followers: 1800000,
    scores: { trust: 38, purchase: 22, knowledge: 15, entertainment: 88, trend: 64, community: 30, persuasion: 41 },
    audience: { students: 58, professionals: 20, other: 22, priceSens: 70, tech: 90, age: [60, 30, 10], interests: ["Gaming gear", "Esports", "Streaming culture"] } },
  { id: "jfield", handle: "@field.julia", niche: "Outdoor & Budget Fitness", followers: 38000,
    scores: { trust: 91, purchase: 84, knowledge: 76, entertainment: 52, trend: 58, community: 89, persuasion: 80 },
    audience: { students: 40, professionals: 25, other: 35, priceSens: 80, tech: 72, age: [35, 40, 25], interests: ["Outdoor gear", "Budget fitness", "Sustainable living"] } },
  { id: "nbench", handle: "@northbenchco", niche: "Home & DIY", followers: 410000,
    scores: { trust: 72, purchase: 65, knowledge: 80, entertainment: 40, trend: 35, community: 70, persuasion: 60 },
    audience: { students: 15, professionals: 55, other: 30, priceSens: 45, tech: 58, age: [18, 46, 36], interests: ["Home renovation", "DIY tools", "Interior design"] } },
  { id: "drnoor", handle: "@drnoor.skin", niche: "Skincare & Dermatology", followers: 92000,
    scores: { trust: 95, purchase: 78, knowledge: 97, entertainment: 35, trend: 45, community: 75, persuasion: 70 },
    audience: { students: 30, professionals: 50, other: 20, priceSens: 35, tech: 40, age: [25, 48, 27], interests: ["Skincare science", "Dermatology", "Clean beauty"] } },
  { id: "rove", handle: "@rove.eats", niche: "Food & Travel", followers: 650000,
    scores: { trust: 60, purchase: 55, knowledge: 40, entertainment: 75, trend: 70, community: 58, persuasion: 62 },
    audience: { students: 25, professionals: 45, other: 30, priceSens: 55, tech: 62, age: [30, 44, 26], interests: ["Travel deals", "Food culture", "City guides"] } },
  { id: "lunaire", handle: "@lunaire.studio", niche: "Fashion & Beauty", followers: 1200000,
    scores: { trust: 50, purchase: 45, knowledge: 30, entertainment: 80, trend: 85, community: 48, persuasion: 75 },
    audience: { students: 48, professionals: 30, other: 22, priceSens: 60, tech: 75, age: [55, 35, 10], interests: ["Fashion trends", "Beauty hauls", "Streetwear"] } },
];

const BRANDS = [
  { id: "verve", name: "Verve Skincare", weights: { trust: .30, knowledge: .30, purchase: .15, persuasion: .15, community: .05, trend: .025, entertainment: .025 } },
  { id: "northfield", name: "Northfield Coffee", weights: { community: .30, entertainment: .25, trust: .15, purchase: .15, trend: .10, knowledge: .025, persuasion: .025 } },
  { id: "lumen", name: "Lumen Sportswear", weights: { trend: .30, persuasion: .25, entertainment: .20, purchase: .15, trust: .05, community: .025, knowledge: .025 } },
  { id: "crestline", name: "Crestline Finance App", weights: { trust: .35, knowledge: .30, persuasion: .15, purchase: .10, community: .05, trend: .025, entertainment: .025 } },
  { id: "bloomhaus", name: "Bloomhaus Furniture", weights: { purchase: .25, community: .25, trust: .20, knowledge: .15, persuasion: .10, trend: .025, entertainment: .025 } },
];

function fmtF(n) { return n >= 1e6 ? (n / 1e6).toFixed(1) + "M" : n >= 1000 ? Math.round(n / 1000) + "K" : String(n); }
function influenceIndex(s) { return Math.round(s.trust*0.25 + s.purchase*0.25 + s.persuasion*0.2 + s.community*0.15 + s.knowledge*0.1 + s.trend*0.025 + s.entertainment*0.025); }
function dominantGene(s) { return GENES.reduce((b, g) => s[g.key] > s[b.key] ? g : b); }
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ---------- SVG GENOME BAR ----------
function genomeBarSVG(scores, height, showVal, compact){
  const n = GENES.length, gap = 8, padT = showVal ? 24 : 8, padB = compact ? 4 : 22;
  const w = 420, bw = (w - gap*(n+1)) / n;
  const baseline = height - padB, top = padT;
  let gridLines = [25,50,75].map(v=>{
    const y = baseline - (v/100)*(baseline-top);
    return '<line x1="0" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="rgba(255,255,255,.06)" stroke-width="1" stroke-dasharray="2 5"/>';
  }).join('');
  let bars = GENES.map(function(g,i){
    const score = Math.max(0, Math.min(100, scores[g.key]||0));
    const x = gap + i*(bw+gap);
    const bh = (score/100)*(baseline-top);
    const y = baseline - bh;
    let s = '<rect x="'+x+'" y="'+(y-6)+'" width="'+bw+'" height="'+(bh+6)+'" rx="'+(bw/2)+'" fill="'+g.color+'" opacity=".14"/>';
    s += '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(bh,2)+'" rx="'+(bw/2)+'" fill="'+g.color+'"/>';
    if (showVal) s += '<text x="'+(x+bw/2)+'" y="'+(y-8)+'" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="600" fill="'+g.color+'">'+score+'</text>';
    if (!compact) s += '<text x="'+(x+bw/2)+'" y="'+(height-6)+'" text-anchor="middle" font-family="Courier New, monospace" font-size="9" letter-spacing="0.5" fill="rgba(234,241,239,.45)">'+g.code+'</text>';
    return s;
  }).join('');
  return '<svg viewBox="0 0 '+w+' '+height+'" width="100%" height="'+height+'" style="display:block">'
    + gridLines
    + '<line x1="0" y1="'+baseline+'" x2="'+w+'" y2="'+baseline+'" stroke="rgba(255,255,255,.13)" stroke-width="1"/>'
    + bars + '</svg>';
}

function logoBarsSVG(size){
  const bars = [
    { c:C.trust, h:.55, y:.45 }, { c:C.purchase, h:.85, y:.15 },
    { c:C.knowledge, h:.7, y:.3 }, { c:C.persuasion, h:1, y:0 },
  ];
  let rects = bars.map(function(b,i){
    return '<rect x="'+(1+i*5)+'" y="'+(b.y*20)+'" width="3.5" height="'+(b.h*20)+'" rx="1.5" fill="'+b.c+'"/>';
  }).join('');
  return '<svg width="'+(size*1.1)+'" height="'+size+'" viewBox="0 0 22 20">'+rects+'</svg>';
}

// ---------- STATE ----------
const state = {
  activeCreator: "prism",
  compareA: "prism",
  compareB: "jfield",
  simCreator: "jfield",
  simBrand: "verve",
  simResult: null,
  simLoading: false,
  audCreator: "jfield",
};

function navTo(id){ const el = document.getElementById(id); if (el) el.scrollIntoView({behavior:"smooth"}); }

// ---------- SECTIONS ----------
function renderHero(){
  const a = CREATORS[0], b = CREATORS[1];
  const domA = dominantGene(a.scores), domB = dominantGene(b.scores);
  const cards = [[a,domA],[b,domB]].map(function(pair){
    const c = pair[0], dom = pair[1];
    return '<div class="panel-raised" style="padding:14px 12px;">'
      + '<div class="mono" style="font-size:9.5px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">'+c.handle+'</div>'
      + '<div class="mono" style="font-size:11px;color:'+C.secondary+';margin-bottom:10px;">'+fmtF(c.followers)+' followers</div>'
      + '<div class="display" style="font-size:26px;color:'+C.trust+';">Trust '+c.scores.trust+'</div>'
      + '<div class="mono" style="font-size:10px;color:'+dom.color+';margin-top:6px;">'+dom.label+': '+c.scores[dom.key]+'</div>'
      + '</div>';
  }).join('');
  return ''
  + '<section style="padding:90px 0 60px;">'
  + '  <div class="wrap hero-grid">'
  + '    <div>'
  + '      <div class="eyebrow"><span class="tick" style="background:'+C.trust+'"></span>The Influence Genome Project</div>'
  + '      <h1 class="display" style="font-size:clamp(34px,5vw,58px);line-height:1.06;margin-bottom:18px;">'
  + '        Don\'t measure reach.<br/>Measure <span style="color:'+C.trust+'">influence.</span>'
  + '      </h1>'
  + '      <p style="font-size:15.5px;color:'+C.secondary+';max-width:440px;margin-bottom:28px;line-height:1.6;">'
  + '        Every creator carries a genome of seven traits that predict whether their audience just watches — or actually acts. CreatorDNA sequences it before a brand spends a dollar.'
  + '      </p>'
  + '      <div style="display:flex;gap:12px;flex-wrap:wrap;">'
  + '        <button class="btn btn-solid" onclick="navTo(\'sequencer\')">Sequence a creator</button>'
  + '        <button class="btn" onclick="navTo(\'simulator\')">Run a simulation</button>'
  + '      </div>'
  + '    </div>'
  + '    <div class="panel" style="padding:20px;">'
  + '      <div class="eyebrow"><span class="tick" style="background:'+C.purchase+'"></span>Live comparison</div>'
  + '      <div class="grid-2" style="margin-bottom:14px;gap:12px;">'+cards+'</div>'
  + '      <div style="padding-top:12px;border-top:1px dashed '+C.line+';font-family:Courier New,monospace;font-size:11px;color:'+C.secondary+';text-align:center;line-height:1.7;">'
  + '        AI recommends <strong style="color:'+C.purchase+'">@field.julia</strong> for purchase-driven campaigns — '
  +          (b.scores.trust - a.scores.trust)+' pts higher trust with '+Math.round((1 - b.followers/a.followers)*100)+'% fewer followers.'
  + '      </div>'
  + '    </div>'
  + '  </div>'
  + '</section>';
}

function renderGenomeMap(){
  const cards = GENES.map(function(g){
    return '<div class="panel" style="padding:14px;">'
      + '<div style="width:10px;height:10px;border-radius:2px;background:'+g.color+';margin-bottom:10px;"></div>'
      + '<div class="display" style="font-size:13px;margin-bottom:5px;color:'+C.primary+';">'+g.label+'</div>'
      + '<div style="font-size:11px;color:'+C.secondary+';line-height:1.45;">'+g.desc+'</div>'
      + '</div>';
  }).join('');
  return ''
  + '<section><div class="wrap">'
  + '  <div class="eyebrow"><span class="tick" style="background:'+C.trust+'"></span>Genome map · 7 loci</div>'
  + '  <h2 class="display" style="font-size:clamp(24px,3.5vw,36px);margin-bottom:10px;">The seven traits brands actually need</h2>'
  + '  <p style="color:'+C.secondary+';font-size:14.5px;max-width:520px;margin-bottom:36px;">Followers and views measure attention. These seven genes measure what attention turns into.</p>'
  + '  <div class="grid-7">'+cards+'</div>'
  + '</div></section>';
}

function renderSequencer(){
  const creator = CREATORS.find(function(c){return c.id===state.activeCreator;});
  const dom = dominantGene(creator.scores);
  const idx = influenceIndex(creator.scores);
  const groups = [
    { l:"Conversion campaigns", v:(creator.scores.trust+creator.scores.purchase+creator.scores.persuasion)/3 },
    { l:"Awareness campaigns", v:(creator.scores.entertainment+creator.scores.trend)/2 },
    { l:"Educational campaigns", v:creator.scores.knowledge },
    { l:"Loyalty & retention", v:creator.scores.community },
  ];
  const fit = groups.sort(function(a,b){return b.v-a.v;})[0].l;

  const cards = CREATORS.map(function(c){
    const d = dominantGene(c.scores);
    const isActive = c.id === state.activeCreator;
    return '<button class="creator-card" onclick="setActiveCreator(\''+c.id+'\')" style="border-color:'+(isActive?d.color:C.line)+';box-shadow:'+(isActive?('0 0 20px -8px '+d.color):'none')+';">'
      + '<div class="accent" style="background:'+d.color+'"></div>'
      + '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;margin-top:6px;">'
      + '<span class="mono" style="font-size:13px;font-weight:600;">'+c.handle+'</span>'
      + '<span style="font-size:10px;color:'+C.dim+';">'+c.niche+'</span>'
      + '</div>'
      + genomeBarSVG(c.scores, 56, false, true)
      + '<div style="display:flex;justify-content:space-between;margin-top:8px;">'
      + '<div><span class="mono" style="font-size:9px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.05em;display:block;">Followers</span><span class="display" style="font-size:18px;color:'+C.secondary+';">'+fmtF(c.followers)+'</span></div>'
      + '<div style="text-align:right;"><span class="mono" style="font-size:9px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.05em;display:block;">Index</span><span class="display" style="font-size:18px;color:'+d.color+';">'+influenceIndex(c.scores)+'</span></div>'
      + '</div></button>';
  }).join('');

  return ''
  + '<section id="sequencer"><div class="wrap">'
  + '  <div class="eyebrow"><span class="tick" style="background:'+C.trust+'"></span>Step 1 · Sequencer</div>'
  + '  <h2 class="display" style="font-size:clamp(24px,3.5vw,36px);margin-bottom:10px;">Pick a creator, read their genome</h2>'
  + '  <p style="color:'+C.secondary+';font-size:14.5px;margin-bottom:32px;">Six creators, six different profiles. Click one to sequence it in full.</p>'
  + '  <div class="grid-3" style="margin-bottom:28px;">'+cards+'</div>'
  + '  <div class="panel" style="padding:28px;">'
  + '    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:14px;">'
  + '      <div>'
  + '        <div class="eyebrow"><span class="tick" style="background:'+dom.color+'"></span>Sequenced profile</div>'
  + '        <h3 class="display" style="font-size:22px;margin-bottom:4px;">'+creator.handle+'</h3>'
  + '        <div style="color:'+C.secondary+';font-size:13px;">'+creator.niche+' · '+fmtF(creator.followers)+' followers</div>'
  + '      </div>'
  + '      <div style="text-align:right;">'
  + '        <div class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.05em;">Influence Index</div>'
  + '        <div class="display" style="font-size:44px;color:'+dom.color+';line-height:1.1;">'+idx+'</div>'
  + '      </div>'
  + '    </div>'
  +      genomeBarSVG(creator.scores, 160, true, false)
  + '    <p style="color:'+C.secondary+';font-size:14px;margin-top:16px;max-width:560px;">'
  +        creator.handle+'\'s dominant gene is <strong style="color:'+dom.color+'">'+dom.label+'</strong> ('+dom.code+': '+creator.scores[dom.key]+'). Best matched to <em>'+fit+'</em>.'
  + '    </p>'
  + '    <div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">'
  + '      <span class="tag">Dominant gene · '+dom.label+'</span>'
  + '      <span class="tag">Best for · '+fit+'</span>'
  + '    </div>'
  + '  </div>'
  + '</div></section>';
}

function renderCompare(){
  const ca = CREATORS.find(function(c){return c.id===state.compareA;});
  const cb = CREATORS.find(function(c){return c.id===state.compareB;});
  const idxA = influenceIndex(ca.scores), idxB = influenceIndex(cb.scores);
  const winner = idxA > idxB ? ca : idxA < idxB ? cb : null;

  function optionsHTML(selId){
    return CREATORS.map(function(cr){
      return '<option value="'+cr.id+'" '+(cr.id===selId?'selected':'')+'>'+cr.handle+'</option>';
    }).join('');
  }

  const deltaCol = GENES.map(function(g){
    const diff = ca.scores[g.key] - cb.scores[g.key];
    const col = diff > 0 ? C.trust : diff < 0 ? C.entertainment : C.dim;
    return '<div class="mono" style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:'+C.secondary+';background:'+C.raised+';border-radius:6px;padding:4px 10px;">'
      + '<span>'+g.code+'</span><span style="color:'+col+';font-weight:600;">'+(diff>0?'+':'')+diff+'</span></div>';
  }).join('');

  const verdict = winner
    ? '<strong style="color:'+C.primary+'">'+winner.handle+'</strong> scores '+Math.abs(idxA-idxB)+' pts higher on Influence Index. Recommended for conversion-driven campaigns.'
    : 'Identical Influence Index — differentiate by campaign fit instead.';

  return ''
  + '<section id="compare"><div class="wrap">'
  + '  <div class="eyebrow"><span class="tick" style="background:'+C.trust+'"></span>Step 2 · Compare</div>'
  + '  <h2 class="display" style="font-size:clamp(24px,3.5vw,36px);margin-bottom:10px;">Put two creators side by side</h2>'
  + '  <p style="color:'+C.secondary+';font-size:14.5px;margin-bottom:32px;">Compare any two profiles gene-by-gene. The delta column does the arguing.</p>'
  + '  <div class="compare-grid">'
  + '    <div class="panel" style="padding:18px;">'
  + '      <div style="margin-bottom:14px;">'
  + '        <label class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px;">Creator A</label>'
  + '        <select onchange="setCompareA(this.value)">'+optionsHTML(state.compareA)+'</select>'
  + '      </div>'
  + '      <div class="mono" style="font-size:12px;color:'+C.secondary+';margin-bottom:14px;">'+fmtF(ca.followers)+' followers · Index '+influenceIndex(ca.scores)+'</div>'

  + '    </div>'
  + '    <div style="display:flex;flex-direction:column;gap:8px;padding-top:68px;">'+deltaCol+'</div>'

}

function renderSimulator(){
  const creatorOpts = CREATORS.map(function(c){
    return '<option value="'+c.id+'" '+(c.id===state.simCreator?'selected':'')+'>'+c.handle+'</option>';
  }).join('');
  const brandOpts = BRANDS.map(function(b){
    return '<option value="'+b.id+'" '+(b.id===state.simBrand?'selected':'')+'>'+b.name+'</option>';
  }).join('');

  let resultsHTML = '';
  if (state.simLoading){
    resultsHTML = '<div style="height:3px;background:'+C.line+';border-radius:2px;overflow:hidden;margin-bottom:20px;">'
      + '<div style="height:100%;width:40%;background:linear-gradient(90deg,transparent,'+C.trust+',transparent);animation:scan .9s linear infinite;"></div></div>';
  } else if (state.simResult){
    const r = state.simResult;
    const metrics = [
      { label:"Engagement rate", val:r.engagement+'%', desc:"Predicted interaction on sponsored content." },
      { label:"Trust impact", val:(r.trustRaw>=0?'+':'')+r.trustRaw, col:r.trustRaw>=0?C.trust:C.entertainment, desc:"Shift in audience trust toward brand." },
      { label:"Conversion probability", val:r.conversion+'%', desc:"Likelihood audience takes a purchase action." },
      { label:"Brand fit score", val:r.brandFit, desc:"Genome alignment with brand category." },
    ];
    const metricCards = metrics.map(function(m){
      return '<div class="panel-raised" style="padding:18px;">'
        + '<div class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;">'+m.label+'</div>'
        + '<div class="display" style="font-size:28px;color:'+(m.col||C.primary)+';">'+m.val+'</div>'
        + '<div style="font-size:11px;color:'+C.secondary+';margin-top:8px;line-height:1.4;">'+m.desc+'</div></div>';
    }).join('');
    resultsHTML = '<div class="grid-4" style="margin-bottom:18px;">'+metricCards+'</div>'
      + '<div style="padding-top:16px;border-top:1px solid '+C.line+';font-size:13.5px;color:'+C.secondary+';">'+r.verdict+'</div>';
  }

  return ''
  + '<section id="simulator"><div class="wrap">'
  + '  <div class="eyebrow"><span class="tick" style="background:'+C.trust+'"></span>Step 3 · Campaign simulator</div>'
  + '  <h2 class="display" style="font-size:clamp(24px,3.5vw,36px);margin-bottom:10px;">A wind tunnel for influencer spend</h2>'
  + '  <p style="color:'+C.secondary+';font-size:14.5px;margin-bottom:28px;">Pick a creator and a brand. CreatorDNA predicts how that pairing performs before any contract is signed.</p>'
  + '  <div class="panel" style="padding:26px;">'
  + '    <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:14px;align-items:flex-end;margin-bottom:24px;">'
  + '      <div><label class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px;">Creator</label>'
  + '        <select onchange="setSimCreator(this.value)">'+creatorOpts+'</select></div>'
  + '      <div><label class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px;">Brand</label>'
  + '        <select onchange="setSimBrand(this.value)">'+brandOpts+'</select></div>'
  + '      <button class="btn btn-solid" onclick="runSimulation()" '+(state.simLoading?'disabled':'')+'>'+(state.simLoading?'Sequencing…':'Run simulation')+'</button>'
  + '    </div>'
  +      resultsHTML
  + '    <div class="mono" style="font-size:10px;color:'+C.dim+';margin-top:16px;">Projections computed from genome alignment — illustrative for this prototype.</div>'
  + '  </div>'
  + '</div></section>';
}

  + '    <div style="max-width:300px;margin-bottom:14px;">'
  + '      <label class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:7px;">Creator</label>'

  + '      <div>'
  + '        <div class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">Who they are</div>'
  + '        <div style="display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:8px;">'
  + '          <div style="width:'+aud.students+'%;background:'+C.community+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#06201C;font-weight:600;">'+aud.students+'%</div>'
  + '          <div style="width:'+aud.professionals+'%;background:'+C.trend+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#111;font-weight:600;">'+aud.professionals+'%</div>'
  + '          <div style="flex:1;background:#3A4448;display:flex;align-items:center;justify-content:center;font-size:10px;color:'+C.secondary+';font-weight:600;">'+aud.other+'%</div>'
  + '        </div>'
  + '        <div style="display:flex;gap:14px;font-size:10px;color:'+C.secondary+';font-family:Courier New,monospace;margin-bottom:22px;">'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+C.community+';margin-right:5px;"></span>Students</span>'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+C.trend+';margin-right:5px;"></span>Professionals</span>'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#3A4448;margin-right:5px;"></span>Other</span>'
  + '        </div>'
  + '        <div class="mono" style="font-size:10px;color:'+C.dim+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;">Age bands</div>'
  + '        <div style="display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:8px;">'
  + '          <div style="width:'+aud.age[0]+'%;background:'+C.knowledge+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600;">'+aud.age[0]+'%</div>'
  + '          <div style="width:'+aud.age[1]+'%;background:'+C.persuasion+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600;">'+aud.age[1]+'%</div>'
  + '          <div style="flex:1;background:#3A4448;display:flex;align-items:center;justify-content:center;font-size:10px;color:'+C.secondary+';font-weight:600;">'+aud.age[2]+'%</div>'
  + '        </div>'
  + '        <div style="display:flex;gap:14px;font-size:10px;color:'+C.secondary+';font-family:Courier New,monospace;">'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+C.knowledge+';margin-right:5px;"></span>18–24</span>'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+C.persuasion+';margin-right:5px;"></span>25–34</span>'
  + '          <span><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:#3A4448;margin-right:5px;"></span>35+</span>'

function renderNav(){
  const links = ["sequencer","compare","simulator","audience"].map(function(id){
    return '<button onclick="navTo(\''+id+'\')">'+(id==='audience'?'Audience DNA':id)+'</button>';
  }).join('');
  return ''
  + '<nav class="nav"><div class="wrap nav-inner">'
  + '  <div class="logo">'+logoBarsSVG(20)+'CreatorDNA</div>'
  + '  <div class="navlinks">'+links+'</div>'
  + '  <button class="btn" onclick="navTo(\'sequencer\')">Sequence a creator</button>'
  + '</div></nav>';
}

function renderFooter(){
  return ''
  + '<footer style="padding:52px 0 44px;text-align:center;">'
  + '  <div class="display" style="font-size:17px;color:'+C.secondary+';font-weight:400;">"The first AI-powered genome sequencing platform for the creator economy."</div>'
  + '  <div class="mono" style="font-size:10px;color:'+C.dim+';margin-top:10px;">CreatorDNA — prototype · Hackfluence · Priyanshi · Pahul · Bhavya</div>'
  + '</footer>';
}

// ---------- MAIN RENDER ----------
function render(){
  const root = document.getElementById('root');
  root.innerHTML = renderNav() + renderHero() + renderGenomeMap() + renderSequencer() + renderCompare() + renderSimulator() + renderAudience() + renderFooter();
}

// ---------- EVENT HANDLERS ----------
function setActiveCreator(id){ state.activeCreator = id; render(); navTo('sequencer'); }
function setCompareA(id){ state.compareA = id; render(); }
function setCompareB(id){ state.compareB = id; render(); }
function setSimCreator(id){ state.simCreator = id; }
function setSimBrand(id){ state.simBrand = id; }
function setAudCreator(id){ state.audCreator = id; render(); }

function runSimulation(){
  state.simLoading = true;
  state.simResult = null;
  render();
  setTimeout(function(){
    const c = CREATORS.find(function(x){return x.id===state.simCreator;});
    const brand = BRANDS.find(function(x){return x.id===state.simBrand;});
    const brandFit = Math.round(GENES.reduce(function(s,g){ return s + c.scores[g.key]*(brand.weights[g.key]||0); }, 0));
    const conversion = Math.round((c.scores.purchase*.4 + c.scores.persuasion*.3 + c.scores.trust*.3) * (brandFit/100));
    const engagement = ((c.scores.entertainment*.6 + c.scores.community*.4)/100*15).toFixed(1);
    const trustRaw = Math.round((c.scores.trust - 50)/5);
    const verdict = brandFit >= 75
      ? ('Strong match. '+c.handle+'\'s genome aligns closely with '+brand.name+' — expect authentic-feeling content and above-average conversion.')
      : brandFit >= 50
        ? ('Workable match. Lean into '+dominantGene(c.scores).label.toLowerCase()+' in the creative brief to close the gap.')
        : ('Weak match. '+c.handle+'\'s strengths don\'t line up with what '+brand.name+' needs.');
    state.simResult = { brandFit: brandFit, conversion: conversion, engagement: engagement, trustRaw: trustRaw, verdict: verdict };
    state.simLoading = false;
    render();
  }, 800);
}

// ---------- INIT ----------
render();
</script>
