<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const C = {
  bg: "#0A0E10", panel: "#12181B", raised: "#161D21", line: "#232B2F",
  primary: "#EAF1EF", secondary: "#A4B5B2", dim: "#5C6B69",
  trust: "#4DD9C4", purchase: "#F2B544", knowledge: "#8B7FE8",
  entertainment: "#F2616B", trend: "#C8E84D", community: "#5AA9E6", persuasion: "#E85AC0",
};

const GENES = [
  { key: "trust", label: "Trust", code: "TRU", color: C.trust, desc: "How much the audience believes a recommendation is genuine." },
  { key: "purchase", label: "Purchase", code: "PUR", color: C.purchase, desc: "Likelihood followers actually buy what gets posted." },
  { key: "knowledge", label: "Knowledge", code: "KNO", color: C.knowledge, desc: "Educational depth and perceived expertise." },
  { key: "entertainment", label: "Entertainment", code: "ENT", color: C.entertainment, desc: "Raw ability to capture and hold attention." },
  { key: "trend", label: "Trend", code: "TRD", color: C.trend, desc: "Power to start trends rather than follow them." },
  { key: "community", label: "Community", code: "COM", color: C.community, desc: "Audience loyalty, repeat engagement, real conversation." },
  { key: "persuasion", label: "Persuasion", code: "PER", color: C.persuasion, desc: "Ability to actually change a follower's decision." },
];

const CREATORS = [
  { id: "prism", handle: "@prismloop", niche: "Gaming & Entertainment", followers: 1800000,
    scores: { trust: 38, purchase: 22, knowledge: 15, entertainment: 88, trend: 64, community: 30, persuasion: 41 },
    audience: { students: 58, professionals: 20, other: 22, priceSens: 70, tech: 90, age: [60, 30, 10], interests: ["Gaming gear", "Esports", "Streaming culture"] } },
  { id: "jfield", handle: "@field.julia", niche: "Outdoor & Budget Fitness", followers: 38000,
    scores: { trust: 91, purchase: 84, knowledge: 76, entertainment: 52, trend: 58, community: 89, persuasion: 80 },
    audience: { students: 40, professionals: 25, other: 35, priceSens: 80, tech: 72, age: [35, 40, 25], interests: ["Outdoor gear", "Budget fitness", "Sustainable living"] } },
  { id: "nbench", handle: "@northbenchco", niche: "Home & DIY", followers: 410000,
    scores: { trust: 72, purchase: 65, knowledge: 80, entertainment: 40, trend: 35, community: 70, persuasion: 60 },
    audience: { students: 15, professionals: 55, other: 30, priceSens: 45, tech: 58, age: [18, 46, 36], interests: ["Home renovation", "DIY tools", "Interior design"] } },
  { id: "drnoor", handle: "@drnoor.skin", niche: "Skincare & Dermatology", followers: 92000,
    scores: { trust: 95, purchase: 78, knowledge: 97, entertainment: 35, trend: 45, community: 75, persuasion: 70 },
    audience: { students: 30, professionals: 50, other: 20, priceSens: 35, tech: 40, age: [25, 48, 27], interests: ["Skincare science", "Dermatology", "Clean beauty"] } },
  { id: "rove", handle: "@rove.eats", niche: "Food & Travel", followers: 650000,
    scores: { trust: 60, purchase: 55, knowledge: 40, entertainment: 75, trend: 70, community: 58, persuasion: 62 },
    audience: { students: 25, professionals: 45, other: 30, priceSens: 55, tech: 62, age: [30, 44, 26], interests: ["Travel deals", "Food culture", "City guides"] } },
  { id: "lunaire", handle: "@lunaire.studio", niche: "Fashion & Beauty", followers: 1200000,
    scores: { trust: 50, purchase: 45, knowledge: 30, entertainment: 80, trend: 85, community: 48, persuasion: 75 },
    audience: { students: 48, professionals: 30, other: 22, priceSens: 60, tech: 75, age: [55, 35, 10], interests: ["Fashion trends", "Beauty hauls", "Streetwear"] } },
];

const BRANDS = [
  { id: "verve", name: "Verve Skincare", weights: { trust: .30, knowledge: .30, purchase: .15, persuasion: .15, community: .05, trend: .025, entertainment: .025 } },
  { id: "northfield", name: "Northfield Coffee", weights: { community: .30, entertainment: .25, trust: .15, purchase: .15, trend: .10, knowledge: .025, persuasion: .025 } },
  { id: "lumen", name: "Lumen Sportswear", weights: { trend: .30, persuasion: .25, entertainment: .20, purchase: .15, trust: .05, community: .025, knowledge: .025 } },
  { id: "crestline", name: "Crestline Finance App", weights: { trust: .35, knowledge: .30, persuasion: .15, purchase: .10, community: .05, trend: .025, entertainment: .025 } },
  { id: "bloomhaus", name: "Bloomhaus Furniture", weights: { purchase: .25, community: .25, trust: .20, knowledge: .15, persuasion: .10, trend: .025, entertainment: .025 } },
];

function fmtF(n) { return n >= 1e6 ? (n / 1e6).toFixed(1) + "M" : n >= 1000 ? Math.round(n / 1000) + "K" : String(n); }
function influenceIndex(s) { return Math.round(s.trust * 0.25 + s.purchase * 0.25 + s.persuasion * 0.2 + s.community * 0.15 + s.knowledge * 0.1 + s.trend * 0.025 + s.entertainment * 0.025); }
function dominantGene(s) { return GENES.reduce((b, g) => s[g.key] > s[b.key] ? g : b); }

const css = `
  *{box-sizing:border-box;margin:0;padding:0;}
  body,#root{background:${C.bg};color:${C.primary};font-family:'Inter',sans-serif;min-height:100vh;}
  ::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:${C.panel};} ::-webkit-scrollbar-thumb{background:${C.line};border-radius:3px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .eyebrow{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:${C.secondary};margin-bottom:12px;}
  .tick{width:18px;height:2px;display:inline-block;flex-shrink:0;}
  .panel{background:${C.panel};border:1px solid ${C.line};border-radius:12px;}
  .panel-raised{background:${C.raised};border:1px solid ${C.line};border-radius:10px;}
  .btn{display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.02em;padding:9px 18px;border-radius:999px;border:1px solid ${C.trust};background:transparent;color:${C.trust};cursor:pointer;transition:background .18s,color .18s,transform .12s;}
  .btn:hover{background:${C.trust};color:#06201C;}
  .btn:active{transform:scale(.97);}
  .btn-solid{background:${C.trust};color:#06201C;}
  .btn-solid:hover{background:#3FC2AE;}
  .btn:disabled{opacity:.5;cursor:default;}
  select{background:${C.raised};border:1px solid ${C.line};color:${C.primary};font-family:'IBM Plex Mono',monospace;font-size:12px;padding:9px 12px;border-radius:8px;width:100%;outline:none;}
  select:focus{border-color:${C.trust};}
  .tag{display:inline-flex;align-items:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.04em;padding:5px 10px;border-radius:999px;border:1px solid ${C.line};color:${C.secondary};text-transform:uppercase;}
  .meter-track{height:7px;background:${C.line};border-radius:6px;overflow:hidden;}
  .meter-fill{height:100%;border-radius:6px;transition:width .4s ease;}
  .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);background:rgba(10,14,16,.85);border-bottom:1px solid ${C.line};}
`;

function GenomeBar({ scores, height = 120, showVal = true, compact = false }) {
  const n = GENES.length, gap = 8, padT = showVal ? 24 : 8, padB = compact ? 4 : 22;
  const w = 420, bw = (w - gap * (n + 1)) / n;
  const baseline = height - padB, top = padT;
  return (
    <svg viewBox={`0 0 ${w} ${height}`} width="100%" height={height} style={{ display: "block" }}>
      {[25, 50, 75].map(v => {
        const y = baseline - (v / 100) * (baseline - top);
        return <line key={v} x1={0} y1={y} x2={w} y2={y} stroke="rgba(255,255,255,.06)" strokeWidth={1} strokeDasharray="2 5" />;
      })}
      <line x1={0} y1={baseline} x2={w} y2={baseline} stroke="rgba(255,255,255,.13)" strokeWidth={1} />
      {GENES.map((g, i) => {
        const score = Math.max(0, Math.min(100, scores[g.key] || 0));
        const x = gap + i * (bw + gap);
        const bh = (score / 100) * (baseline - top);
        const y = baseline - bh;
        return (
          <g key={g.key}>
            <rect x={x} y={y - 6} width={bw} height={bh + 6} rx={bw / 2} fill={g.color} opacity={.14} />
            <rect x={x} y={y} width={bw} height={Math.max(bh, 2)} rx={bw / 2} fill={g.color} />
            {showVal && <text x={x + bw / 2} y={y - 8} textAnchor="middle" fontFamily="'IBM Plex Mono',monospace" fontSize={11} fontWeight={600} fill={g.color}>{score}</text>}
            {!compact && <text x={x + bw / 2} y={height - 6} textAnchor="middle" fontFamily="'IBM Plex Mono',monospace" fontSize={9} letterSpacing={0.5} fill="rgba(234,241,239,.45)">{g.code}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function LogoBars({ size = 20 }) {
  const bars = [
    { c: C.trust, h: .55, y: .45 }, { c: C.purchase, h: .85, y: .15 },
    { c: C.knowledge, h: .7, y: .3 }, { c: C.persuasion, h: 1, y: 0 },
  ];
  return (
    <svg width={size * 1.1} height={size} viewBox="0 0 22 20">
      {bars.map((b, i) => (
        <rect key={i} x={1 + i * 5} y={b.y * 20} width={3.5} height={b.h * 20} rx={1.5} fill={b.c} />
      ))}
    </svg>
  );
}

function Hero({ onNav }) {
  const a = CREATORS[0], b = CREATORS[1];
  return (
    <section style={{ padding: "90px 0 60px", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px", display: "grid", gridTemplateColumns: "1.1fr 1fr", gap: 52, alignItems: "center" }}>
        <div>
          <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />The Influence Genome Project</div>
          <h1 className="display" style={{ fontSize: "clamp(34px,5vw,58px)", lineHeight: 1.06, letterSpacing: "-.02em", fontWeight: 600, marginBottom: 18 }}>
            Don't measure reach.<br />Measure <span style={{ color: C.trust }}>influence.</span>
          </h1>
          <p style={{ fontSize: 15.5, color: C.secondary, maxWidth: 440, marginBottom: 28, lineHeight: 1.6 }}>
            Every creator carries a genome of seven traits that predict whether their audience just watches — or actually acts. CreatorDNA sequences it before a brand spends a dollar.
          </p>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <button className="btn btn-solid" onClick={() => onNav("sequencer")}>Sequence a creator</button>
            <button className="btn" onClick={() => onNav("simulator")}>Run a simulation</button>
          </div>
        </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
            {[a, b].map(c => {
              const dom = dominantGene(c.scores);

                  <div className="mono" style={{ fontSize: 11, color: C.secondary, marginBottom: 10 }}>{fmtF(c.followers)} followers</div>
                  <div className="display" style={{ fontSize: 26, fontWeight: 700, color: C.trust }}>Trust {c.scores.trust}</div>
                  <div className="mono" style={{ fontSize: 10, color: dom.color, marginTop: 6 }}>{dom.label}: {c.scores[dom.key]}</div>

            })}
          </div>
          <div style={{ paddingTop: 12, borderTop: `1px dashed ${C.line}`, fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: C.secondary, textAlign: "center", lineHeight: 1.7 }}>
            AI recommends <strong style={{ color: C.purchase }}>@field.julia</strong> for purchase-driven campaigns —{" "}
            {b.scores.trust - a.scores.trust} pts higher trust with {Math.round((1 - b.followers / a.followers) * 100)}% fewer followers.
          </div>
        </div>
      </div>
    </section>
  );
}

function GenomeMapSection() {
  return (
    <section style={{ padding: "80px 0", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px" }}>
        <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />Genome map · 7 loci</div>
        <h2 className="display" style={{ fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 600, marginBottom: 10 }}>The seven traits brands actually need</h2>
        <p style={{ color: C.secondary, fontSize: 14.5, maxWidth: 520, marginBottom: 36 }}>Followers and views measure attention. These seven genes measure what attention turns into.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 10 }}>
          {GENES.map(g => (
            <div key={g.key} className="panel" style={{ padding: 14 }}>
              <div style={{ width: 10, height: 10, borderRadius: 2, background: g.color, marginBottom: 10 }} />
              <div className="display" style={{ fontSize: 13, fontWeight: 600, marginBottom: 5, color: C.primary }}>{g.label}</div>
              <div style={{ fontSize: 11, color: C.secondary, lineHeight: 1.45 }}>{g.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </section>

}

function SequencerSection({ active, setActive }) {
  const creator = CREATORS.find(c => c.id === active);
  const dom = dominantGene(creator.scores);
  const idx = influenceIndex(creator.scores);
  const fit = (() => {
    const groups = [
      { l: "Conversion campaigns", v: (creator.scores.trust + creator.scores.purchase + creator.scores.persuasion) / 3 },
      { l: "Awareness campaigns", v: (creator.scores.entertainment + creator.scores.trend) / 2 },
      { l: "Educational campaigns", v: creator.scores.knowledge },
      { l: "Loyalty & retention", v: creator.scores.community },
    ];
    return groups.sort((a, b) => b.v - a.v)[0].l;
  })();

  return (
    <section id="sequencer" style={{ padding: "80px 0", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px" }}>
        <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />Step 1 · Sequencer</div>
        <h2 className="display" style={{ fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 600, marginBottom: 10 }}>Pick a creator, read their genome</h2>
        <p style={{ color: C.secondary, fontSize: 14.5, marginBottom: 32 }}>Six creators, six different profiles. Click one to sequence it in full.</p>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 28 }}>
          {CREATORS.map(c => {
            const d = dominantGene(c.scores);
            const isActive = c.id === active;
            return (
              <button key={c.id} onClick={() => setActive(c.id)} style={{
                background: C.panel, border: `1px solid ${isActive ? d.color : C.line}`,
                boxShadow: isActive ? `0 0 20px -8px ${d.color}` : "none",
                borderRadius: 12, padding: 14, cursor: "pointer", textAlign: "left", color: C.primary,
                transition: "border-color .18s,box-shadow .18s", position: "relative", overflow: "hidden"
              }}>
                <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: d.color }} />
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8, marginTop: 6 }}>
                  <span className="mono" style={{ fontSize: 13, fontWeight: 600 }}>{c.handle}</span>
                  <span style={{ fontSize: 10, color: C.dim }}>{c.niche}</span>
                </div>
                <GenomeBar scores={c.scores} height={56} showVal={false} compact />
                <div style={{ display: "flex", justifyContent: "space-between", marginTop: 8 }}>
                  <div><span className="mono" style={{ fontSize: 9, color: C.dim, textTransform: "uppercase", letterSpacing: ".05em", display: "block" }}>Followers</span><span className="display" style={{ fontSize: 18, fontWeight: 700, color: C.secondary }}>{fmtF(c.followers)}</span></div>
                  <div style={{ textAlign: "right" }}><span className="mono" style={{ fontSize: 9, color: C.dim, textTransform: "uppercase", letterSpacing: ".05em", display: "block" }}>Index</span><span className="display" style={{ fontSize: 18, fontWeight: 700, color: d.color }}>{influenceIndex(c.scores)}</span></div>
                </div>
              </button>
            );
          })}
        </div>
        <div className="panel" style={{ padding: 28 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18, flexWrap: "wrap", gap: 14 }}>
            <div>
              <div className="eyebrow"><span className="tick" style={{ background: dom.color }} />Sequenced profile</div>
              <h3 className="display" style={{ fontSize: 22, fontWeight: 600, marginBottom: 4 }}>{creator.handle}</h3>
              <div style={{ color: C.secondary, fontSize: 13 }}>{creator.niche} · {fmtF(creator.followers)} followers</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".05em" }}>Influence Index</div>
              <div className="display" style={{ fontSize: 44, fontWeight: 700, color: dom.color, lineHeight: 1.1 }}>{idx}</div>
            </div>
          </div>
          <GenomeBar scores={creator.scores} height={160} />
          <p style={{ color: C.secondary, fontSize: 14, marginTop: 16, maxWidth: 560 }}>
            {creator.handle}'s dominant gene is <strong style={{ color: dom.color }}>{dom.label}</strong> ({dom.code}: {creator.scores[dom.key]}). Best matched to <em>{fit}</em>.
          </p>
          <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
            <span className="tag">Dominant gene · {dom.label}</span>
            <span className="tag">Best for · {fit}</span>
          </div>
        </div>
      </div>
    </section>
  );
}

function CompareSection() {
  const [a, setA] = useState("prism");
  const [b, setB] = useState("jfield");
  const ca = CREATORS.find(c => c.id === a);
  const cb = CREATORS.find(c => c.id === b);
  const idxA = influenceIndex(ca.scores), idxB = influenceIndex(cb.scores);
  const winner = idxA > idxB ? ca : idxA < idxB ? cb : null;

  return (
    <section id="compare" style={{ padding: "80px 0", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px" }}>
        <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />Step 2 · Compare</div>
        <h2 className="display" style={{ fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 600, marginBottom: 10 }}>Put two creators side by side</h2>
        <p style={{ color: C.secondary, fontSize: 14.5, marginBottom: 32 }}>Compare any two profiles gene-by-gene. The delta column does the arguing.</p>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 100px 1fr", gap: 18, alignItems: "start" }}>
          {[[ca, setA, "compareA"], [cb, setB, "compareB"]].map(([c, setter, id], ci) => (
            <div key={id} className="panel" style={{ padding: 18 }}>
              <div style={{ marginBottom: 14 }}>
                <label className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", display: "block", marginBottom: 7 }}>Creator {ci === 0 ? "A" : "B"}</label>
                <select value={c.id} onChange={e => setter(e.target.value)}>
                  {CREATORS.map(cr => <option key={cr.id} value={cr.id}>{cr.handle}</option>)}
                </select>
              </div>
              <div className="mono" style={{ fontSize: 12, color: C.secondary, marginBottom: 14 }}>{fmtF(c.followers)} followers · Index {influenceIndex(c.scores)}</div>
              <GenomeBar scores={c.scores} height={150} showVal />
            </div>
          ))}
          <div style={{ display: "flex", flexDirection: "column", gap: 8, paddingTop: 68 }}>
            {GENES.map(g => {
              const diff = ca.scores[g.key] - cb.scores[g.key];
              const col = diff > 0 ? C.trust : diff < 0 ? C.entertainment : C.dim;
              return (
                <div key={g.key} className="mono" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 11, color: C.secondary, background: C.raised, borderRadius: 6, padding: "4px 10px" }}>
                  <span>{g.code}</span>
                  <span style={{ color: col, fontWeight: 600 }}>{diff > 0 ? "+" : ""}{diff}</span>
                </div>
              );
            })}
          </div>
        </div>
        <div className="panel" style={{ padding: "16px 20px", marginTop: 22, fontSize: 14, color: C.secondary }}>
          {winner
            ? <><strong style={{ color: C.primary }}>{winner.handle}</strong> scores {Math.abs(idxA - idxB)} pts higher on Influence Index. Recommended for conversion-driven campaigns.</>
            : <>Identical Influence Index — differentiate by campaign fit instead.</>}
        </div>
      </div>
    </section>
  );
}

function SimulatorSection() {
  const [creatorId, setCreatorId] = useState("jfield");
  const [brandId, setBrandId] = useState("verve");
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  function run() {
    setLoading(true);
    setResult(null);
    setTimeout(() => {
      const c = CREATORS.find(x => x.id === creatorId);
      const brand = BRANDS.find(x => x.id === brandId);
      const brandFit = Math.round(GENES.reduce((s, g) => s + c.scores[g.key] * (brand.weights[g.key] || 0), 0));
      const conversion = Math.round((c.scores.purchase * .4 + c.scores.persuasion * .3 + c.scores.trust * .3) * (brandFit / 100));
      const engagement = ((c.scores.entertainment * .6 + c.scores.community * .4) / 100 * 15).toFixed(1);
      const trustRaw = Math.round((c.scores.trust - 50) / 5);
      const verdict = brandFit >= 75
        ? `Strong match. ${c.handle}'s genome aligns closely with ${brand.name} — expect authentic-feeling content and above-average conversion.`
        : brandFit >= 50
          ? `Workable match. Lean into ${dominantGene(c.scores).label.toLowerCase()} in the creative brief to close the gap.`
          : `Weak match. ${c.handle}'s strengths don't line up with what ${brand.name} needs.`;
      setResult({ brandFit, conversion, engagement, trustRaw, verdict });
      setLoading(false);
    }, 800);
  }

  const metrics = result ? [
    { label: "Engagement rate", val: `${result.engagement}%`, desc: "Predicted interaction on sponsored content." },
    { label: "Trust impact", val: (result.trustRaw >= 0 ? "+" : "") + result.trustRaw, col: result.trustRaw >= 0 ? C.trust : C.entertainment, desc: "Shift in audience trust toward brand." },
    { label: "Conversion probability", val: `${result.conversion}%`, desc: "Likelihood audience takes a purchase action." },
    { label: "Brand fit score", val: result.brandFit, desc: "Genome alignment with brand category." },
  ] : [];

  return (
    <section id="simulator" style={{ padding: "80px 0", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px" }}>
        <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />Step 3 · Campaign simulator</div>
        <h2 className="display" style={{ fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 600, marginBottom: 10 }}>A wind tunnel for influencer spend</h2>
        <p style={{ color: C.secondary, fontSize: 14.5, marginBottom: 28 }}>Pick a creator and a brand. CreatorDNA predicts how that pairing performs before any contract is signed.</p>
        <div className="panel" style={{ padding: 26 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 14, alignItems: "flex-end", marginBottom: 24 }}>
            <div>
              <label className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", display: "block", marginBottom: 7 }}>Creator</label>
              <select value={creatorId} onChange={e => setCreatorId(e.target.value)}>
                {CREATORS.map(c => <option key={c.id} value={c.id}>{c.handle}</option>)}
              </select>
            </div>
            <div>
              <label className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", display: "block", marginBottom: 7 }}>Brand</label>
              <select value={brandId} onChange={e => setBrandId(e.target.value)}>
                {BRANDS.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
              </select>
            </div>
            <button className="btn btn-solid" onClick={run} disabled={loading}>{loading ? "Sequencing…" : "Run simulation"}</button>
          </div>
          {loading && (
            <div style={{ height: 3, background: C.line, borderRadius: 2, overflow: "hidden", marginBottom: 20 }}>
              <div style={{ height: "100%", width: "40%", background: `linear-gradient(90deg,transparent,${C.trust},transparent)`, animation: "scan .9s linear infinite" }} />
            </div>
          )}
          {result && (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14, marginBottom: 18 }}>
                {metrics.map(m => (
                  <div key={m.label} className="panel-raised" style={{ padding: 18 }}>
                    <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".05em", marginBottom: 10 }}>{m.label}</div>
                    <div className="display" style={{ fontSize: 28, fontWeight: 700, color: m.col || C.primary }}>{m.val}</div>
                    <div style={{ fontSize: 11, color: C.secondary, marginTop: 8, lineHeight: 1.4 }}>{m.desc}</div>
                  </div>
                ))}
              </div>
              <div style={{ paddingTop: 16, borderTop: `1px solid ${C.line}`, fontSize: 13.5, color: C.secondary }}>{result.verdict}</div>
            </>
          )}
          <div className="mono" style={{ fontSize: 10, color: C.dim, marginTop: 16 }}>Projections computed from genome alignment — illustrative for this prototype.</div>
        </div>
      </div>
      <style>{`@keyframes scan{from{margin-left:-40%;}to{margin-left:100%;}}`}</style>
    </section>
  );
}

function AudienceSection() {

  const c = CREATORS.find(x => x.id === id);
  const aud = c.audience;

  return (
    <section id="audience" style={{ padding: "80px 0" }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px" }}>
        <div className="eyebrow"><span className="tick" style={{ background: C.trust }} />Step 4 · Audience DNA</div>
        <h2 className="display" style={{ fontSize: "clamp(24px,3.5vw,36px)", fontWeight: 600, marginBottom: 10 }}>The genome isn't just the creator's</h2>
        <p style={{ color: C.secondary, fontSize: 14.5, marginBottom: 28 }}>CreatorDNA sequences the audience too, so brands match creators to the people most likely to buy.</p>
        <div className="panel" style={{ padding: 28 }}>
          <div style={{ maxWidth: 300, marginBottom: 14 }}>
            <label className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", display: "block", marginBottom: 7 }}>Creator</label>
            <select value={id} onChange={e => setId(e.target.value)}>
              {CREATORS.map(cr => <option key={cr.id} value={cr.id}>{cr.handle}</option>)}
            </select>
          </div>
          <h3 className="display" style={{ fontSize: 18, fontWeight: 600, marginBottom: 24 }}>{c.handle} — Audience DNA</h3>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 36 }}>
            <div>
              <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Who they are</div>
              <div style={{ display: "flex", height: 32, borderRadius: 6, overflow: "hidden", marginBottom: 8 }}>
                <div style={{ width: `${aud.students}%`, background: C.community, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#06201C", fontWeight: 600 }}>{aud.students}%</div>
                <div style={{ width: `${aud.professionals}%`, background: C.trend, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#111", fontWeight: 600 }}>{aud.professionals}%</div>
                <div style={{ flex: 1, background: "#3A4448", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: C.secondary, fontWeight: 600 }}>{aud.other}%</div>
              </div>
              <div style={{ display: "flex", gap: 14, fontSize: 10, color: C.secondary, fontFamily: "'IBM Plex Mono',monospace", marginBottom: 22 }}>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: C.community, marginRight: 5 }} />Students</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: C.trend, marginRight: 5 }} />Professionals</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#3A4448", marginRight: 5 }} />Other</span>
              </div>
              <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Age bands</div>
              <div style={{ display: "flex", height: 32, borderRadius: 6, overflow: "hidden", marginBottom: 8 }}>
                <div style={{ width: `${aud.age[0]}%`, background: C.knowledge, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 600 }}>{aud.age[0]}%</div>
                <div style={{ width: `${aud.age[1]}%`, background: C.persuasion, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", fontWeight: 600 }}>{aud.age[1]}%</div>
                <div style={{ flex: 1, background: "#3A4448", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: C.secondary, fontWeight: 600 }}>{aud.age[2]}%</div>
              </div>
              <div style={{ display: "flex", gap: 14, fontSize: 10, color: C.secondary, fontFamily: "'IBM Plex Mono',monospace" }}>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: C.knowledge, marginRight: 5 }} />18–24</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: C.persuasion, marginRight: 5 }} />25–34</span>
                <span><span style={{ display: "inline-block", width: 8, height: 8, borderRadius: 2, background: "#3A4448", marginRight: 5 }} />35+</span>
              </div>
            </div>
            <div>
              <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 16 }}>Buying behavior</div>
              {[
                { label: "Price sensitivity", val: aud.priceSens, col: C.purchase },
                { label: "Tech enthusiasm", val: aud.tech, col: C.knowledge },
              ].map(m => (
                <div key={m.label} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontFamily: "'IBM Plex Mono',monospace", fontSize: 11, color: C.secondary, marginBottom: 7 }}>
                    <span>{m.label}</span><span>{m.val}%</span>
                  </div>
                  <div className="meter-track"><div className="meter-fill" style={{ width: `${m.val}%`, background: m.col }} /></div>

              ))}
              <div className="mono" style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: ".06em", marginBottom: 12 }}>Top interests</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {aud.interests.map(i => <span key={i} className="tag">{i}</span>)}
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function App() {
  const [activeCreator, setActiveCreator] = useState("prism");

  function navTo(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth" });
  }

  return (
    <>
      <style>{css}</style>
      <nav className="nav">
        <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 28px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 64, gap: 20 }}>
          <div className="display" style={{ display: "flex", alignItems: "center", gap: 9, fontWeight: 700, fontSize: 17, letterSpacing: "-.02em" }}>
            <LogoBars size={20} />CreatorDNA
          </div>
          <div style={{ display: "flex", gap: 24, fontFamily: "'IBM Plex Mono',monospace", fontSize: 12, letterSpacing: ".04em", color: C.secondary }}>
            {["sequencer", "compare", "simulator", "audience"].map(id => (
              <button key={id} onClick={() => navTo(id)} style={{ background: "none", border: "none", color: C.secondary, cursor: "pointer", fontSize: 12, fontFamily: "'IBM Plex Mono',monospace", letterSpacing: ".04em", padding: "4px 2px", textTransform: "capitalize" }}>{id === "audience" ? "Audience DNA" : id}</button>
            ))}
          </div>
          <button className="btn" onClick={() => navTo("sequencer")}>Sequence a creator</button>
        </div>
      </nav>
      <Hero onNav={navTo} />
      <GenomeMapSection />
      <SequencerSection active={activeCreator} setActive={setActiveCreator} />
      <CompareSection />
      <SimulatorSection />
      <AudienceSection />
      <footer style={{ padding: "52px 0 44px", textAlign: "center", borderTop: `1px solid ${C.line}` }}>
        <div className="display" style={{ fontSize: 17, color: C.secondary }}>"The first AI-powered genome sequencing platform for the creator economy."</div>
        <div className="mono" style={{ fontSize: 10, color: C.dim, marginTop: 10 }}>CreatorDNA — prototype · Hackfluence · Priyanshi · Pahul · Bhavya</div>
      </footer>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
